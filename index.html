<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_top">
<title>HaiLux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#222}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;border:1px solid #ddd;border-radius:6px;padding:8px 12px;width:100%}
input:focus,select:focus,textarea:focus{border-color:#1a3a8f}
.hidden{display:none!important}
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:#0d1b4b;color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
#main{margin-left:220px;flex:1;padding:24px}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h2{font-size:1.4rem;font-weight:700;color:#c8d8f8;letter-spacing:.1em;text-transform:uppercase;font-family:'Cormorant Garamond',serif}
.sidebar-logo p{font-size:.75rem;color:#aaa;margin-top:2px}
.sidebar-user{padding:12px 20px;font-size:.85rem;color:#ccc;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-user strong{color:#fff;display:block}
nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#c8d8f8;font-size:.9rem;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#c8d8f8}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{background:rgba(255,255,255,.08);color:#ccc;padding:8px 16px;border-radius:6px;font-size:.85rem;width:100%}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1b4b}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:2.4rem;font-weight:700;color:#0d1b4b;font-family:'Cormorant Garamond',serif;letter-spacing:.08em;text-transform:uppercase}
.login-logo p{color:#888;font-size:.9rem;margin-top:4px}
.login-tabs{display:flex;margin-bottom:24px;border:1px solid #eee;border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:10px;text-align:center;font-size:.9rem;color:#888;cursor:pointer;transition:.2s}
.login-tab.active{background:#0d1b4b;color:#fff;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#555;margin-bottom:6px}
.btn-primary{background:#0d1b4b;color:#fff;padding:12px;border-radius:8px;font-size:1rem;font-weight:600;width:100%;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-primary:disabled{opacity:.7;cursor:not-allowed}
.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
.login-error{color:#0d1b4b;font-size:.85rem;margin-top:8px;text-align:center}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:1.5rem;font-weight:700;color:#0d1b4b}
.page-header .sub{font-size:.9rem;color:#888;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #1a3a8f}
.stat-card.red{border-left-color:#0d1b4b}
.stat-card.green{border-left-color:#4CAF50}
.stat-card.orange{border-left-color:#FF9800}
.stat-card.blue{border-left-color:#2196F3}
.stat-val{font-size:2rem;font-weight:700}
.stat-lbl{font-size:.85rem;color:#888;margin-top:4px}
.stat-sub{font-size:.8rem;color:#aaa;margin-top:2px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px}
.card-toolbar{padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #f0f0f0}
.card-body{padding:20px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8f9ff}
th{padding:12px 16px;text-align:left;font-size:.82rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 16px;font-size:.9rem;border-top:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafbff}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600}
.badge-red{background:#e8edf8;color:#0d1b4b}
.btn{padding:8px 16px;border-radius:8px;font-size:.88rem;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.2s}
.btn-sm{padding:5px 10px;font-size:.8rem;border-radius:6px}
.btn-blue{background:#1a3a8f;color:#fff}
.btn-green{background:#4CAF50;color:#fff}
.btn-outline{background:#fff;border:1px solid #ddd;color:#555}
.btn-outline:hover{border-color:#1a3a8f;color:#1a3a8f}
.btn-ghost{background:transparent;color:#888;padding:6px 10px;border-radius:6px}
.btn-ghost:hover{background:#f5f5f5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:900px}
.modal-hd{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd h3{font-size:1.1rem;font-weight:700}
.modal-bd{padding:24px;overflow-y:auto;flex:1}
.modal-ft{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.btn-x{background:none;font-size:1.3rem;color:#aaa;line-height:1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.row1{grid-template-columns:1fr;margin-bottom:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.fg label{display:block;font-size:.83rem;font-weight:600;color:#555;margin-bottom:5px}
.fg{margin-bottom:0}
textarea{resize:vertical;min-height:80px}
.hint{font-size:.78rem;color:#aaa;margin-top:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.detail-box{background:#f8f9ff;border-radius:10px;padding:16px}
.detail-box h4{font-size:.85rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.88rem}
.detail-row .lbl{color:#888}
.detail-row .val{font-weight:500;text-align:right;max-width:60%}
.task-item{background:#f8f9ff;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid #eee}
.task-item:hover{border-color:#1a3a8f;background:#eef2ff}
.task-num{width:28px;height:28px;border-radius:50%;background:#1a3a8f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.task-info{flex:1}
.task-name{font-weight:600;font-size:.92rem}
.task-meta{font-size:.8rem;color:#888;margin-top:3px}
.task-acts{display:flex;gap:6px;flex-shrink:0}
.sec-title{font-size:1rem;font-weight:700;color:#0d1b4b;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.emp-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #ddd;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px}
.emp-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.ec-avt{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:zoom-in;overflow:hidden}
.ec-avt img{width:44px;height:44px;object-fit:cover;border-radius:8px;display:block}
.ec-body{flex:1;min-width:0}
.emp-card.in-progress{border-left-color:#FF9800}
.emp-card.upcoming{border-left-color:#1a3a8f}
.emp-card.done{border-left-color:#4CAF50;opacity:.7}
.emp-card.blocked{opacity:.5}
.ec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ec-name{font-weight:600;font-size:.95rem}
.ec-job{font-size:.82rem;color:#888;margin-bottom:4px}
.ec-dl{font-size:.8rem;color:#888}
.ec-dl.over{color:#0d1b4b;font-weight:600}
.imgs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:12px}
.img-th{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f0f0;cursor:pointer}
.img-th img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:22px;height:22px;font-size:.7rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;border:none}
.img-th:hover .img-del{opacity:1}
.img-th img{width:100%;height:100%;object-fit:cover;transition:.2s}
.img-th:hover img{opacity:.9}
.img-broken{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#ccc;font-size:1.5rem;background:#f5f5f5}
.img-uploading{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#eef2ff}
.job-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid #eee;background:#f5f5f5;cursor:zoom-in}
.job-thumb-ph{width:40px;height:40px;border-radius:8px;flex-shrink:0;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#ccc}
.upload-zone{border:2px dashed #b8c8f0;border-radius:10px;padding:20px;text-align:center;color:#aaa;cursor:pointer;transition:.2s;background:#fafbff}
.upload-zone:hover{border-color:#1a3a8f;color:#1a3a8f;background:#eef2ff}
.upload-zone.drag-over{border-color:#1a3a8f;background:#e0e8ff;color:#1a3a8f}
/* Lightbox */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lb-img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;z-index:9999;background:none;border:none;opacity:.8}
.lb-close:hover{opacity:1}
.set-sec{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.set-sec h3{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:.9rem}
.set-row:last-child{border-bottom:none}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-it{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:.82rem;background:#f0f0f0;color:#333}
.tag-it .tdot{width:8px;height:8px;border-radius:50%}
.tag-it .rm{cursor:pointer;color:#aaa;font-size:.9rem}
.tag-it .rm:hover{color:#0d1b4b}
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#0d1b4b;color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.ok{border-left:4px solid #4CAF50}
.toast.err{border-left:4px solid #0d1b4b}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:#aaa;gap:8px}
.spin{width:20px;height:20px;border:2px solid #eee;border-top-color:#1a3a8f;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.money{font-family:monospace;font-weight:600}
.empty{text-align:center;padding:40px;color:#aaa}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.8rem;background:#f0f2f5;color:#555}
.divider{height:1px;background:#f0f0f0;margin:16px 0}
.muted{color:#aaa;font-size:.85rem}

/* ===== DAG ===== */
.dag-wrap{overflow-x:auto;padding:20px 4px;background:#f8f9ff;border-radius:10px;margin-bottom:20px}
.dag-flow{display:flex;align-items:center;gap:0;min-width:max-content;padding:0 8px}
.dag-node{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;cursor:pointer}
.dag-box{padding:10px 14px;border-radius:10px;font-size:.8rem;font-weight:600;text-align:center;width:110px;height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.dag-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.dag-box.done{background:#e8f5e9;border-color:#4CAF50;color:#2e7d32}
.dag-box.in_progress{background:#fff3e0;border-color:#FF9800;color:#e65100}
.dag-box.todo{background:#f5f5f5;border-color:#bdbdbd;color:#757575}
.dag-box.rejected{background:#ffebee;border-color:#f44336;color:#c62828}
.dag-name{font-size:.78rem;font-weight:700;line-height:1.3;word-break:break-word;text-align:center}
.dag-assignee{font-size:.72rem;font-weight:400;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.dag-status-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.dag-arrow{display:flex;align-items:center;padding:0 4px;color:#bbb;font-size:1.1rem;flex-shrink:0;margin-top:-18px}
.dag-order{font-size:.65rem;color:#aaa;font-weight:400}
.dag-icon{font-size:1rem;line-height:1}

/* ===== BOTTOM NAV (mobile) ===== */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:200}
.bn-item{flex:1;padding:8px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#aaa;cursor:pointer;transition:.15s}
.bn-item.active{color:#0d1b4b}
.bn-icon{font-size:19px;line-height:1}

/* ===== JOB CARD MOBILE ===== */
.job-card-m{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:3px solid #ddd;cursor:pointer;transition:.15s}
.job-card-m:active{opacity:.85}
.jcm-avt{width:44px;height:44px;border-radius:8px;background:#dce5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.jcm-avt img{width:44px;height:44px;object-fit:cover;border-radius:8px;display:block}
.jcm-body{flex:1;min-width:0}
.jcm-code{font-size:10px;color:#aaa;margin-bottom:1px}
.jcm-name{font-size:13px;font-weight:600;color:#0d1b4b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jcm-customer{font-size:11px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jcm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:8px}
.jcm-meta{font-size:10px;color:#aaa;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== TASK CARD MOBILE (manager view) ===== */
.task-card-m{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:.15s}
.task-card-m:active{opacity:.85}
.tcm-name{font-size:13px;font-weight:600;color:#0d1b4b}
.tcm-job{font-size:11px;color:#555;margin-top:3px}
.tcm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:8px}
.tcm-meta{font-size:10px;color:#aaa;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== TABLET: sidebar icon-only ===== */
@media(max-width:1024px) and (min-width:768px){
  #sidebar{width:56px}
  #main{margin-left:56px}
  .sidebar-logo{padding:14px 0;text-align:center}
  .sidebar-logo h2{font-size:.85rem;letter-spacing:.05em}
  .sidebar-logo p,.sidebar-user,.sidebar-footer{display:none}
  .nav-item{padding:12px 0;justify-content:center}
  .nav-lbl{display:none}
}

/* ===== MOBILE: bottom nav, full-width cards ===== */
@media(max-width:767px){
  input,select,textarea{font-size:16px!important}
  body{overflow-x:hidden}
  #sidebar{display:none}
  #main{margin-left:0;padding:12px 12px 72px;max-width:100vw;overflow-x:hidden}
  #pg-dashboard,#pg-jobs,#pg-tasks,#pg-mytasks,#pg-settings{max-width:100%}
  .task-card-m,.job-card-m,.emp-card{max-width:100%;overflow:hidden}
  #bottom-nav{display:flex}
  #toast-wrap{bottom:72px;right:12px}
  .modal-bg{align-items:flex-end;padding:0}
  .modal{max-width:100%;max-height:92vh;border-radius:16px 16px 0 0}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .row2,.row3{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .page-header{margin-bottom:14px}
  .card-toolbar{flex-direction:column;align-items:stretch;gap:8px}
  .card-toolbar input,.card-toolbar select{max-width:100%!important;width:100%}
  .tbl-wrap table{display:none}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><h1>HaiLux</h1><p>Hệ thống quản lý công việc</p></div>
    <div class="login-tabs">
      <div class="login-tab active" id="tab-ql" onclick="switchTab('manager')">Quản lý</div>
      <div class="login-tab" id="tab-nv" onclick="switchTab('employee')">Nhân viên</div>
    </div>
    <div id="form-manager">
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="inp-pw" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Đăng nhập</button>
      <p class="login-error hidden" id="err-pw">Mật khẩu không đúng</p>
    </div>
    <div id="form-emp" class="hidden">
      <div class="form-group"><label>Chọn tên của bạn</label><select id="sel-emp"><option value="">-- Chọn nhân viên --</option></select></div>
      <button class="btn-primary" id="btn-login-emp" onclick="doLoginEmp()">Vào xem việc của tôi</button>
      <p class="login-error hidden" id="err-emp">Vui lòng chọn tên</p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-logo"><h2>HaiLux</h2><p>Quản lý công việc</p></div>
    <div class="sidebar-user" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px"><span class="muted" style="font-size:.8rem;flex-shrink:0">Xin chào,</span><strong id="sb-name" style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis">—</strong></div>
    <nav id="sb-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="doLogout()">&#8592; Đăng xuất</button></div>
  </div>
  <div id="main">
    <div id="pg-dashboard" class="hidden"></div>
    <div id="pg-jobs" class="hidden"></div>
    <div id="pg-tasks" class="hidden"></div>
    <div id="pg-mytasks" class="hidden"></div>
    <div id="pg-settings" class="hidden"></div>
  </div>
  <div id="bottom-nav"></div>
</div>

<div id="modal-wrap"></div>
<div id="toast-wrap"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  toast('JS Error: ' + msg + ' (line ' + line + ')', 'err');
  console.error(msg, err);
};
window.addEventListener('unhandledrejection', function(e) {

// ---- AUTH ----
function switchTab(tab) {
  document.getElementById('tab-ql').classList.toggle('active', tab === 'manager');
  document.getElementById('tab-nv').classList.toggle('active', tab === 'employee');
  document.getElementById('form-manager').classList.toggle('hidden', tab !== 'manager');
  document.getElementById('form-emp').classList.toggle('hidden', tab !== 'employee');
}

function setLoginLoading(btnId, loading, label) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<div class="btn-spin"></div> Đang kiểm tra...' : (label || 'Đăng nhập');
}

function doLogin() {
  var pw = document.getElementById('inp-pw').value;
  setLoginLoading('btn-login', true);
  document.getElementById('err-pw').classList.add('hidden');
  google.script.run
    .withSuccessHandler(function(ok) {
      setLoginLoading('btn-login', false, 'Đăng nhập');
      if (ok) { APP.role = 'manager'; APP.user = {name:'Quản lý', role:'manager'}; enterApp(); }
      else { document.getElementById('err-pw').classList.remove('hidden'); }
    })
    .withFailureHandler(function(e){ setLoginLoading('btn-login', false, 'Đăng nhập'); toast(e.message,'err'); })
    .verifyManagerPassword(pw);
}

function doLoginEmp() {
  var id = document.getElementById('sel-emp').value;
  if (!id) { document.getElementById('err-emp').classList.remove('hidden'); return; }
  setLoginLoading('btn-login-emp', true);
  APP.role = 'employee';
  APP.user = APP.user_by_id(id);
  setTimeout(enterApp, 100); // nhỏ delay để spinner kịp hiện
}

function isMobile() { return window.innerWidth < 768; }

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-name').textContent = APP.user.name;
  var menu = APP.role === 'manager'
    ? [{id:'dashboard',icon:'📊',lbl:'Dashboard'},{id:'jobs',icon:'👜',lbl:'Công việc'},{id:'tasks',icon:'📋',lbl:'Đầu việc'},{id:'settings',icon:'⚙️',lbl:'Cài đặt'}]
    : [{id:'mytasks',icon:'✅',lbl:'Việc của tôi'}];
  document.getElementById('sb-nav').innerHTML = menu.map(function(m) {
    return '<div class="nav-item" id="nav-'+m.id+'" onclick="goTo(\''+m.id+'\')"><span>'+m.icon+'</span><span class="nav-lbl">'+m.lbl+'</span></div>';
  }).join('');
  document.getElementById('bottom-nav').innerHTML = menu.map(function(m) {
    return '<div class="bn-item" id="bn-'+m.id+'" onclick="goTo(\''+m.id+'\')"><span class="bn-icon">'+m.icon+'</span>'+m.lbl+'</div>';
  }).join('') + '<div class="bn-item" onclick="doLogout()"><span class="bn-icon">↩️</span>Đăng xuất</div>';
  goTo(APP.role === 'manager' ? 'dashboard' : 'mytasks');
}

function doLogout() {
  APP.role = null; APP.user = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('inp-pw').value = '';
  setLoginLoading('btn-login', false, 'Đăng nhập');
  setLoginLoading('btn-login-emp', false, 'Vào xem việc của tôi');
}

function goTo(page) {
  APP.page = page;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var n = document.getElementById('nav-'+page); if(n) n.classList.add('active');
  document.querySelectorAll('.bn-item').forEach(function(el){ el.classList.remove('active'); });
  var bn = document.getElementById('bn-'+page); if(bn) bn.classList.add('active');
  document.querySelectorAll('#main > div').forEach(function(el){ el.classList.add('hidden'); });
  var pg = document.getElementById('pg-'+page); if(pg) pg.classList.remove('hidden');
  if (page === 'dashboard') renderDashboard();
  else if (page === 'jobs') renderJobs();
  else if (page === 'tasks') renderAllTasks();
  else if (page === 'mytasks') renderMyTasks();
  else if (page === 'settings') renderSettings();
}

function renderJobsTable() {
  if (!_jobs) return;
  if (isMobile()) { renderJobsCards(); return; }
  var q = (_jobSearch||'').toLowerCase();
  var rows = _jobs.filter(function(j) {
    var ms  = !q || (j.code||'').toLowerCase().indexOf(q)>=0 || (j.name||'').toLowerCase().indexOf(q)>=0 || (j.customer_name||'').toLowerCase().indexOf(q)>=0;
    var mst = !_jobStatus   || j.status_id === _jobStatus;
    var mct = !_jobCategory || (j.category||'') === _jobCategory;
    return ms && mst && mct;
  });
  var tbody = document.getElementById('jobs-tbody');
  if (!tbody) return;
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="10"><div class="empty">Không có job nào</div></td></tr>'; return; }
  var html = '';
  rows.forEach(function(j) {
    var st   = APP.st(j.status_id);
    var norm = (st ? st.label : '').toLowerCase().replace(/\s/g,'');
    var over = j.deadline && new Date(j.deadline) < new Date() && norm !== 'hoànthành' && norm !== 'hủy';
    var daysLeft = j.deadline ? Math.ceil((new Date(j.deadline)-new Date())/86400000) : null;
    html += '<tr>';
    html += '<td><span style="font-weight:700;color:#0d1b4b;font-size:.88rem">'+esc(j.code||'—')+'</span></td>';
    var thumbHtml = j.avatar_id
      ? '<img class="job-thumb" src="https://lh3.googleusercontent.com/d/'+j.avatar_id+'" onclick="event.stopPropagation();openLightbox(\'https://lh3.googleusercontent.com/d/'+j.avatar_id+'\',\'https://drive.google.com/file/d/'+j.avatar_id+'/view\')">'
      : '<div class="job-thumb-ph">📦</div>';

function renderJobsCards() {
  var el = document.getElementById('jobs-cards');

  var q = (_jobSearch||'').toLowerCase();
  var rows = _jobs.filter(function(j) {
    var ms  = !q || (j.code||'').toLowerCase().indexOf(q)>=0 || (j.name||'').toLowerCase().indexOf(q)>=0 || (j.customer_name||'').toLowerCase().indexOf(q)>=0;
    var mst = !_jobStatus   || j.status_id === _jobStatus;
    var mct = !_jobCategory || (j.category||'') === _jobCategory;
    return ms && mst && mct;
  });
  if (!rows.length) { el.innerHTML = '<div class="empty">Không có job nào</div>'; return; }
  var html = '';
  rows.forEach(function(j) {
    var st   = APP.st(j.status_id);
    var norm = (st ? st.label : '').toLowerCase().replace(/\s/g,'');
    var over = j.deadline && new Date(j.deadline) < new Date() && norm !== 'hoànthành' && norm !== 'hủy';
    var daysLeft = j.deadline ? Math.ceil((new Date(j.deadline)-new Date())/86400000) : null;
    var color = st ? st.color : '#ddd';
    var avtHtml = j.avatar_id
      ? '<div class="jcm-avt" onclick="event.stopPropagation();viewImg(\''+j.avatar_id+'\')" style="cursor:zoom-in"><img src="https://lh3.googleusercontent.com/d/'+j.avatar_id+'" onerror="this.parentNode.innerHTML=\'📦\'"></div>'
      : '<div class="jcm-avt">📦</div>';
    var metaParts = [];
    if (j.received_date) metaParts.push('Nhận '+fmtDate(j.received_date));
    if (j.deadline) metaParts.push((over?'<span style="color:#c00">quá '+Math.abs(daysLeft)+' ngày</span>':(daysLeft!==null&&daysLeft<=7?'<span style="color:#FF9800">còn '+daysLeft+' ngày</span>':'hạn '+fmtDate(j.deadline))));
    html += '<div class="job-card-m" style="border-left-color:'+color+'" onclick="openJobDetail(\''+j.id+'\')">';
    html += avtHtml;
    html += '<div class="jcm-body">';
    html += '<div class="jcm-code">'+esc(j.code||'')+(j.category?' · '+esc(j.category):'')+'</div>';
    html += '<div class="jcm-name">'+esc(j.name||'—')+'</div>';
    if (j.customer_name) html += '<div class="jcm-customer">'+esc(j.customer_name)+(j.customer_contact?' · '+esc(j.customer_contact):'')+'</div>';
    html += '<div class="jcm-footer"><span class="jcm-meta">'+metaParts.join(' · ')+'</span>';
    if (st) html += '<span class="badge" style="background:'+st.color+'22;color:'+st.color+';flex-shrink:0">'+st.label+'</span>';
    html += '</div></div></div>';
  });

function saveJob(jobId) {
  var data = {
    code: gv('f-code'), name: gv('f-name'), category: gv('f-cat'),
    customer_name: gv('f-cname'), customer_contact: gv('f-ccontact'),
    received_date: gv('f-rdate'), deadline: gv('f-dl'),
    revenue: gv('f-rev'), repair_scope: gv('f-scope'),
    status_id: gv('f-st'), notes: gv('f-notes')
  };
  if (!data.name) { toast('Vui lòng nhập tên sản phẩm','err'); return; }
  var btn = document.getElementById('btn-save-job');
  if (btn) { btn.disabled = true; btn.textContent = 'Đang lưu...'; }

  function doSave(avatarId) {
    if (avatarId) data.avatar_id = avatarId;
    var fn   = jobId ? 'updateJob' : 'createJob';
    var args = jobId ? [jobId, data] : [data];
    google.script.run
      .withSuccessHandler(function() { _pendingAvatarFile=null; toast(jobId?'Đã cập nhật':'Đã tạo job','ok'); closeModal(); renderJobs(); })
      .withFailureHandler(function(e){ if(btn){btn.disabled=false;btn.textContent='Lưu';} toast(e.message,'err'); })
    [fn].apply(google.script.run, args);
  }

  if (_pendingAvatarFile) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      google.script.run
        .withSuccessHandler(function(res) { doSave(res.drive_file_id); })
        .withFailureHandler(function(){ doSave(null); })
        .uploadJobAvatarOnly(b64, _pendingAvatarFile.type, _pendingAvatarFile.name, APP.user?APP.user.name:'');
    };
    reader.readAsDataURL(_pendingAvatarFile);
  } else {
    doSave(null);
  }
}

function renderDAG(tasks, tst) {
  if (!tasks || !tasks.length) return '';
  var sorted = tasks.slice().sort(function(a,b){ return Number(a.order)-Number(b.order); });

  var nodes = sorted.map(function(t) {
    var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
    var stLabel = st ? st.label : '';
    var nl = (stLabel||'').toLowerCase().replace(/\s/g,'');
    var cls = 'todo', icon = '○';
    if (nl==='hoànthành'||nl==='đãxong')    { cls='done';        icon='✓'; }
    else if (nl==='đanglàm')                { cls='in_progress'; icon='⟳'; }
    else if (nl==='từchối'||nl==='reject')  { cls='rejected';    icon='✕'; }
    var asgn = APP.user_by_id(t.assignee_id);
    var asgnName = asgn ? asgn.name : '—';
    return '<div class="dag-node" title="'+(stLabel||'Chưa làm')+' · '+asgnName+'">'
      + '<div class="dag-box '+cls+'">'
      +   '<div class="dag-icon">'+icon+'</div>'
      +   '<div class="dag-name">'+esc(t.name||'—')+'</div>'
      +   '<div class="dag-assignee">'+esc(asgnName)+'</div>'
      + '</div>'
      + '<div class="dag-order">#'+( t.order||'?')+'</div>'
      + '</div>';
  });

  var parts = [];
  nodes.forEach(function(n, i) {
    parts.push(n);
    if (i < nodes.length-1) parts.push('<div class="dag-arrow">→</div>');
  });

  return '<div class="dag-wrap"><div class="dag-flow">'+parts.join('')+'</div></div>';
}

function renderTasksHtml(tasks, tst, job) {

    var asgn = APP.user_by_id(t.assignee_id);
    var dl = t.deadline || (job&&job.deadline);
    var over = dl && new Date(dl)<new Date() && st && st.label!=='Hoàn thành';
    html += '<div class="task-item">';
    html += '<div class="task-num">'+(t.order||i+1)+'</div>';

    html += '</div></div></div>';

function trigUpload(type, id, gridId) {
  document.getElementById('uf-'+type+'-'+id).click();

function handleUpload(input, type, id, gridId) {
  var files = Array.prototype.slice.call(input.files);
  if (!files.length) return;
  uploadFilesSequential(files, 0, type, id, gridId, function(){ input.value = ''; });
}

function uploadFilesSequential(files, index, type, id, gridId, done) {
  if (index >= files.length) { done && done(); return; }
  var file = files[index];
  var grid = document.getElementById(gridId);

  // Thêm placeholder loading
  var placeholder = null;
  if (grid) {
    placeholder = document.createElement('div');
    placeholder.className = 'img-th img-uploading';
    placeholder.innerHTML = '<div class="spin"></div>';
    grid.appendChild(placeholder);
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(img) {
        if (placeholder && placeholder.parentNode) {
          var d = document.createElement('div');
          d.innerHTML = imgThumb(img, type, id, gridId);
          var newEl = d.firstChild;
          placeholder.parentNode.replaceChild(newEl, placeholder);
        }
        toast('Đã tải: '+file.name, 'ok');
        uploadFilesSequential(files, index+1, type, id, gridId, done);
      })
      .withFailureHandler(function(er){
        if (placeholder && placeholder.parentNode) placeholder.remove();
        toast('Lỗi: '+er.message, 'err');
        uploadFilesSequential(files, index+1, type, id, gridId, done);
      })
      .uploadImage(b64, file.type, file.name, type, id, APP.user.name||'', '');
  };
  reader.readAsDataURL(file);
}

function uploadEvidenceAndUnlock(input, taskId) {
  var files = Array.prototype.slice.call(input.files);
  if (!files.length) return;

  // Nếu đang là zone trống → đổi thành imgs-grid với placeholder spinners
  var zone = input.parentNode.querySelector('[style*="border:2px dashed"]');
  var grid = document.getElementById('ei-'+taskId);
  if (zone && !grid) {
    var newGrid = document.createElement('div');
    newGrid.className = 'imgs-grid';
    newGrid.id = 'ei-'+taskId;
    zone.parentNode.replaceChild(newGrid, zone);
    grid = newGrid;
  }

  // Thêm placeholder spinner cho mỗi file
  var placeholders = files.map(function() {
    var ph = document.createElement('div');
    ph.className = 'img-th img-uploading';
    ph.innerHTML = '<div class="spin"></div>';
    if (grid) grid.appendChild(ph);
    return ph;
  });

  var pending = files.length;
  files.forEach(function(file, idx) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      google.script.run
        .withSuccessHandler(function(result) {
          // Thay placeholder bằng ảnh thật
          var ph = placeholders[idx];
          if (ph && ph.parentNode) {
            var cdnUrl  = result.cdn_url;
            var viewUrl = 'https://drive.google.com/file/d/'+result.drive_file_id+'/view';
            var d = document.createElement('div');
            d.className = 'img-th';
            d.innerHTML = '<img src="'+cdnUrl+'" style="width:100%;height:100%;object-fit:cover;cursor:zoom-in" onclick="openLightbox(\''+cdnUrl+'\',\''+viewUrl+'\')">'
              + '<button class="img-del" onclick="event.stopPropagation();delEvidence(\''+taskId+'\',\''+result.drive_file_id+'\',\'ei-'+taskId+'\')">✕</button>';
            ph.parentNode.replaceChild(d, ph);
          }
          pending--;
          if (pending === 0) {
            toast('Đã tải '+files.length+' ảnh', 'ok');
            // Unlock nút trạng thái
            ['btn-start-'+taskId,'btn-done-'+taskId].forEach(function(id){
              var btn = document.getElementById(id);
              if (!btn) return;
              btn.style.opacity='1'; btn.style.cursor='pointer';
              btn.onclick = (function(b){ return function(){
                var tst=APP.stList('task'), norm=function(s){return (s||'').toLowerCase().replace(/\s/g,'');};
                var isStart = b.id.indexOf('start')>-1;
                var s = isStart ? tst.filter(function(x){return norm(x.label)==='đanglàm';})[0]
                                : tst.filter(function(x){return norm(x.label)==='hoànthành'||norm(x.label)==='đãxong';})[0];
                if (s) empUpdStatusBtn(b, taskId, s.id, '');
              }; })(btn);
            });
            // Ẩn cảnh báo "cần có ảnh"
            var warn = document.querySelector('#modal-body .warn-no-img');
            if (warn) warn.style.display='none';
          }
        })
        .withFailureHandler(function(er){
          if (placeholders[idx] && placeholders[idx].parentNode) placeholders[idx].remove();
          toast(er.message,'err');
        })
        .uploadTaskEvidence(b64, file.type, file.name, taskId, APP.user?APP.user.name:'');
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

var _allTasksCache = [];

function loadAllTasks() {
  var el = document.getElementById('tasks-content');
  if (el) el.innerHTML = spinner();
  google.script.run
    .withSuccessHandler(function(tasks) {
      _allTasksCache = tasks || [];
      renderTasksContent();
    })
    .withFailureHandler(function(e){ var c=document.getElementById('tasks-content'); if(c) c.innerHTML='<p class="empty">Lỗi: '+e.message+'</p>'; })
    .getAllTasksWithDetails(_taskFilters);
}

function renderTasksContent() {
  var el2 = document.getElementById('tasks-content');
  if (!el2) return;
  var tasks = _allTasksCache;
  var tst = APP.stList('task');
  var norm = function(s){ return (s||'').toLowerCase().replace(/\s/g,''); };

  // Group by status, priority order
  var order = { 'đanglàm':1, 'chưalàm':2, 'hoànthành':3, 'đãxong':3 };
  var groups = {};
  tst.forEach(function(s){ groups[s.id] = { status: s, items: [] }; });

  tasks.forEach(function(t){
    // Bỏ qua task của job không có tasks configured (job.task_count === 0 không thể xảy ra vì task này tồn tại)
    if (!t.job) return;
    if (groups[t.status_id]) groups[t.status_id].items.push(t);
  });

  var sortedGroups = Object.values(groups)
    .filter(function(g){ return g.items.length > 0; })
    .sort(function(a,b){
      var oa = a.status ? (order[norm(a.status.label)]||5) : 5;
      var ob = b.status ? (order[norm(b.status.label)]||5) : 5;
      return oa - ob;
    });

  if (!sortedGroups.length) { el2.innerHTML = '<div class="empty">Không có task nào</div>'; return; }

  var html = '';
  sortedGroups.forEach(function(g) {
    var s = g.status;
    var sid = s ? s.id : '__none';
    var color = s ? s.color : '#9E9E9E';
    var isActive = s && (norm(s.label) === 'đanglàm');
    var page = _taskPages[sid] || 1;
    var pageSize = isActive ? g.items.length : _taskPageSize; // Đang làm: hiện tất cả
    var total = g.items.length;
    var totalPages = Math.ceil(total / pageSize);
    var pageItems = isActive ? g.items : g.items.slice((page-1)*pageSize, page*pageSize);

    html += '<div style="margin-bottom:24px">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
    html += '<span style="width:12px;height:12px;border-radius:50%;background:'+color+';display:inline-block"></span>';
    html += '<strong style="font-size:.95rem">'+(s?s.label:'Không rõ')+'</strong>';
    html += '<span class="chip">'+total+'</span></div>';
    if (isMobile()) {
      html += '<div>';
      pageItems.forEach(function(t) {
        var dl = t.effective_deadline;
        var isDone = s && (norm(s.label)==='hoànthành'||norm(s.label)==='đãxong');
        var over = dl && new Date(dl) < new Date() && !isDone;
        var daysLeft = dl ? Math.ceil((new Date(dl)-new Date())/86400000) : null;
        var metaParts = [];
        if (t.assignee) metaParts.push(esc(t.assignee.name));
        if (dl) metaParts.push(over?'<span style="color:#c00">quá '+Math.abs(daysLeft)+' ngày</span>':(daysLeft!==null&&daysLeft<=3?'<span style="color:#FF9800">còn '+daysLeft+' ngày</span>':fmtDate(dl)));
        var avtId = t.job && t.job.avatar_id;
        var avtHtml = avtId
          ? '<div class="jcm-avt" onclick="event.stopPropagation();viewImg(\''+avtId+'\')" style="cursor:zoom-in"><img src="https://lh3.googleusercontent.com/d/'+avtId+'" onerror="this.parentNode.innerHTML=\'📦\'"></div>'
          : '<div class="jcm-avt">📦</div>';
        html += '<div class="task-card-m" style="display:flex;align-items:flex-start;gap:12px;border-left:3px solid '+color+'">';
        html += avtHtml;
        html += '<div style="flex:1;min-width:0">';
        html += '<div class="tcm-name">'+esc(t.name||'—')+'</div>';
        html += '<div class="tcm-job">'+esc(t.job?t.job.code+' · '+t.job.name:'—')+'</div>';
        html += '<div class="tcm-footer"><span class="tcm-meta">'+metaParts.join(' · ')+'</span>';
        if (s) html += '<span class="badge" style="background:'+color+'22;color:'+color+';flex-shrink:0">'+s.label+'</span>';
        html += '</div></div></div>';
      });
      html += '</div>';
    } else {
      html += '<div class="card"><div class="tbl-wrap"><table><thead><tr>';
      html += '<th>Đầu việc</th><th>Job</th><th>Nhân viên</th><th>Deadline</th><th>Ghi chú</th></tr></thead><tbody>';
      pageItems.forEach(function(t) {
        var dl = t.effective_deadline;
        var isDone = s && (norm(s.label)==='hoànthành'||norm(s.label)==='đãxong');
        var over = dl && new Date(dl) < new Date() && !isDone;
        var daysLeft = dl ? Math.ceil((new Date(dl)-new Date())/86400000) : null;
        html += '<tr>';
        html += '<td><strong>'+esc(t.name||'—')+'</strong></td>';
        html += '<td><div style="font-size:.85rem;font-weight:500">'+esc(t.job?t.job.code:'—')+'</div><div style="font-size:.78rem;color:#aaa">'+esc(t.job?t.job.name:'')+'</div></td>';
        html += '<td>'+(t.assignee?'<span style="font-size:.85rem">'+esc(t.assignee.name)+'</span>':'<span style="color:#ccc;font-size:.82rem">Chưa phân công</span>')+'</td>';
        html += '<td>'+(dl
          ? '<div style="font-size:.85rem;font-weight:'+(over?700:400)+';color:'+(over?'#0d1b4b':'#333')+'">'+fmtDate(dl)+'</div>'
            +(over?'<div style="font-size:.75rem;color:#0d1b4b">quá '+Math.abs(daysLeft)+' ngày</div>'
            :daysLeft!==null&&daysLeft>=0&&daysLeft<=3?'<div style="font-size:.75rem;color:#FF9800">còn '+daysLeft+' ngày</div>':'')
          :'<span style="color:#ccc">—</span>')+'</td>';
        html += '<td style="font-size:.82rem;color:#888;max-width:180px">'+esc(t.notes||'')+'</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // Pagination controls
    if (!isActive && totalPages > 1) {
      var pStyle = isMobile() ? 'display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-top:4px' : 'display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid #f0f0f0';
      html += '<div style="'+pStyle+'">';
      html += '<span style="font-size:.82rem;color:#888">'+((page-1)*pageSize+1)+' – '+Math.min(page*pageSize,total)+' / '+total+' task</span>';
      html += '<div style="display:flex;gap:6px">';
      html += '<button class="btn btn-sm btn-outline" '+(page<=1?'disabled':'')+' onclick="_taskPages[\''+sid+'\']='+( page-1)+';renderTasksContent()">‹</button>';
      for (var p=1;p<=totalPages;p++) {
        html += '<button class="btn btn-sm '+(p===page?'btn-blue':'btn-outline')+'" onclick="_taskPages[\''+sid+'\']='+p+';renderTasksContent()">'+p+'</button>';
      }
      html += '<button class="btn btn-sm btn-outline" '+(page>=totalPages?'disabled':'')+' onclick="_taskPages[\''+sid+'\']='+( page+1)+';renderTasksContent()">›</button>';
      html += '</div></div>';
    } else if (!isActive) {
      var countStyle = isMobile() ? 'padding:4px 0;font-size:.82rem;color:#aaa' : 'padding:8px 16px;font-size:.82rem;color:#aaa;border-top:1px solid #f0f0f0';
      html += '<div style="'+countStyle+'">'+total+' task</div>';
    }
    if (!isMobile()) html += '</div>'; // close .card
    html += '</div>'; // close group div
  });
  el2.innerHTML = html;
}

// ---- MY TASKS ----
function renderMyTasks() {
  var el = document.getElementById('pg-mytasks');
  el.innerHTML = spinner();
  google.script.run
    .withSuccessHandler(function(tasks) {
      var tst = APP.stList('task');
      var groups = {
        in_progress: {lbl:'🔥 Đang làm',        dot:'#FF9800', items:[]},
        ready:       {lbl:'✅ Có thể làm',       dot:'#4CAF50', items:[]},
        upcoming:    {lbl:'⏰ Sắp đến lượt',    dot:'#1a3a8f', items:[]},
        done:        {lbl:'☑️ Đã hoàn thành',   dot:'#9E9E9E', items:[]},
        blocked:     {lbl:'🔒 Chưa đến lượt',   dot:'#ddd',    items:[]},
      };
      tasks.forEach(function(t){ if(groups[t.availability]) groups[t.availability].items.push(t); });
      var html = '<div class="page-header"><div><h1>Việc của '+esc(APP.user.name)+'</h1><p class="sub">Tổng: '+tasks.length+' task</p></div>';
      html += '<button class="btn btn-outline" onclick="renderMyTasks()">Làm mới</button></div>';
      Object.keys(groups).forEach(function(key) {
        var g = groups[key];
        if (!g.items.length) return;
        html += '<div class="sec-title"><span class="dot" style="background:'+g.dot+'"></span>'+g.lbl+' <span class="chip">'+g.items.length+'</span></div>';
        g.items.forEach(function(t) {
          var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
          var dl = t.effective_deadline;
          var over = dl && new Date(dl)<new Date() && st && st.label!=='Hoàn thành';
          var avtId = t.job && t.job.avatar_id;
          var avtHtml = avtId
            ? '<div class="ec-avt" onclick="event.stopPropagation();viewImg(\''+avtId+'\')" title="Xem ảnh"><img src="https://lh3.googleusercontent.com/d/'+avtId+'" onerror="this.parentNode.innerHTML=\'📦\'"></div>'
            : '<div class="ec-avt">📦</div>';
          html += '<div class="emp-card '+key+'" onclick="openEmpTask(\''+t.id+'\')">';
          html += avtHtml;
          html += '<div class="ec-body">';
          html += '<div class="ec-hd"><span class="ec-name">'+esc(t.name||'—')+'</span>';
          html += (st?'<span class="badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.label+'</span>':'')+'</div>';
          html += '<div class="ec-job">'+esc((t.job&&t.job.code)||'')+' '+ esc((t.job&&t.job.name)||'—')+'</div>';
          html += '<div class="ec-dl'+(over?' over':'')+'">'+( dl?fmtDate(dl):'Không có deadline')+(over?' · Quá hạn':'')+(t.prev_task?' · Sau: '+esc(t.prev_task.name):'')+'</div>';
          html += '</div></div>';
        });
      });
      if (!tasks.length) html += '<div class="empty" style="margin-top:60px">Không có task nào được giao</div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(e){ el.innerHTML = '<p class="empty">Lỗi: '+e.message+'</p>'; })
    .getEnrichedTasksForAssignee(APP.user.id);
}

function openEmpTask(taskId) {
  showModal(spinner());
  google.script.run
    .withSuccessHandler(function(data) {
      var t = data.task, imgs = data.images, avail = data.availability || 'ready', prevImgs = data.prev_task_images || [];
      var canAct = (avail === 'ready' || avail === 'in_progress');
      var tst = APP.stList('task');
      var st = tst.filter(function(s){ return s.id===t.status_id; })[0];
      // So sánh không phân biệt hoa thường
      var norm = function(s){ return (s||'').toLowerCase().replace(/\s/g,''); };
      var doneS = tst.filter(function(s){ return norm(s.label)==='hoànthành'||norm(s.label)==='đãxong'; })[0];
      var ipS   = tst.filter(function(s){ return norm(s.label)==='đanglàm'; })[0];
      var isDone = doneS && st && norm(st.label)===norm(doneS.label);
      var isIP   = ipS   && st && norm(st.label)===norm(ipS.label);
      var hasEvidence = imgs.length > 0;
      // Hiện banner nếu chưa đến lượt
      if (!canAct && avail !== 'done') {
        var blockMsg = avail === 'upcoming' ? '⏰ Task này sắp đến lượt — chờ task trước hoàn thành' : '🔒 Task này chưa đến lượt — cần hoàn thành task trước';
      }
      var html = '<div class="modal-hd"><h3>'+esc(t.name)+'</h3><button class="btn-x" onclick="closeModal()">✕</button></div>';
      html += '<div class="modal-bd">';

      // Status + xem job
      html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">';
      if (st) html += '<span class="badge" style="background:'+st.color+'22;color:'+st.color+';font-size:.9rem;padding:6px 14px">'+st.label+'</span>';
      html += '<button class="btn btn-sm btn-outline" onclick="closeModal();openEmpJobView(\''+t.job_id+'\')">👜 Xem Job</button>';
      html += '</div>';

      // Banner chưa đến lượt
      if (!canAct && avail !== 'done') {
        var blockMsg = avail === 'upcoming' ? '⏰ Sắp đến lượt — chờ task trước hoàn thành' : '🔒 Chưa đến lượt — cần hoàn thành task trước';
        html += '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;color:#7b5800">'+blockMsg+'</div>';
      }

      // Ảnh tình trạng từ các task trước đã hoàn thành
      if (prevImgs.length) {
        html += '<div style="margin-bottom:14px;background:#f8f9ff;border-radius:10px;padding:12px 14px">';
        html += '<div style="font-size:.8rem;font-weight:500;color:#0d1b4b;margin-bottom:10px">📸 Tình trạng từ bước trước</div>';
        prevImgs.forEach(function(g) {
          html += '<div style="font-size:.75rem;color:#888;margin-bottom:6px">'+esc(g.task_name)+'</div>';
          html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
          g.images.forEach(function(img) {
            html += '<img src="'+img.cdn_url+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:zoom-in" onclick="openLightbox(\''+img.cdn_url+'\',\'https://drive.google.com/file/d/'+img.drive_file_id+'/view\')">';
          });
          html += '</div>';
        });
        html += '</div>';
      }

      // Ghi chú từ quản lý (readonly)
      if (t.notes) html += '<div class="detail-box" style="margin-bottom:14px;border-left:3px solid #0d1b4b"><h4 style="color:#0d1b4b">📋 Ghi chú từ quản lý</h4><p style="font-size:.88rem;white-space:pre-line">'+esc(t.notes)+'</p></div>';

      // Ảnh + action chỉ hiện khi đến lượt
      if (!canAct && avail !== 'done') {
        html += '</div><div class="modal-ft"><button class="btn btn-outline" onclick="closeModal()">Đóng</button></div>';
        setModal(html); return;
      }

      // Ảnh bằng chứng — PHẢI up trước khi đổi trạng thái
      html += '<div style="margin-bottom:14px">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
      html += '<div><strong>Ảnh tình trạng</strong>';
      if (!hasEvidence && !isDone) html += ' <span style="font-size:.78rem;color:#c0392b;font-weight:500">— cần có ảnh để đổi trạng thái</span>';
      html += '</div><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'euf-'+taskId+'\').click()">+ Tải ảnh</button></div>';
      html += '<input type="file" id="euf-'+taskId+'" accept="image/*" multiple style="display:none" onchange="uploadEvidenceAndUnlock(this,\''+taskId+'\')">';
      if (imgs.length === 0) {
        html += '<div style="border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;color:#bbb;font-size:.85rem;cursor:pointer" onclick="document.getElementById(\'euf-'+taskId+'\').click()">📷 Kéo thả hoặc click để tải ảnh lên</div>';
      } else {
        html += '<div class="imgs-grid" id="ei-'+taskId+'">';
        imgs.forEach(function(img){
          var cdnUrl  = img.cdn_url || 'https://lh3.googleusercontent.com/d/'+img.drive_file_id;
          var viewUrl = 'https://drive.google.com/file/d/'+img.drive_file_id+'/view';
          html += '<div class="img-th"><img src="'+cdnUrl+'" style="width:100%;height:100%;object-fit:cover;cursor:zoom-in" onclick="openLightbox(\''+cdnUrl+'\',\''+viewUrl+'\')">'
            + '<button class="img-del" onclick="event.stopPropagation();delEvidence(\''+taskId+'\',\''+img.drive_file_id+'\',\'ei-'+taskId+'\')">✕</button></div>';
        });
        html += '</div>';
      }
      html += '</div>';

      // Ghi chú của nhân viên
      html += '<div class="fg"><label>✍️ Ghi chú cho quản lý</label>';
      html += '<textarea id="emp-notes" rows="3" placeholder="Ghi lại tình trạng, vấn đề phát sinh, lưu ý...">'+esc(t.emp_notes||'')+'</textarea></div>';

      html += '</div>';
      html += '<div class="modal-ft" style="justify-content:space-between"><button class="btn btn-outline" onclick="closeModal()">Đóng</button><div style="display:flex;gap:8px">';
      // Nút đổi trạng thái — disable nếu chưa có ảnh
      if (ipS && !isIP && !isDone) {
        html += '<button id="btn-start-'+taskId+'" class="btn btn-outline" style="border-color:#FF9800;color:#FF9800" onclick="empUpdStatusBtn(this,\''+taskId+'\',\''+ipS.id+'\',\''+t.job_id+'\')">▶ Bắt đầu</button>';
      }
      if (doneS && !isDone) {
        html += '<button id="btn-done-'+taskId+'" class="btn btn-green" style="'+(hasEvidence?'':'opacity:.4;cursor:not-allowed;')+'" onclick="'+(hasEvidence?'empUpdStatusBtn(this,\''+taskId+'\',\''+doneS.id+'\',\''+t.job_id+'\')':'toast(\'Vui lòng tải ảnh tình trạng trước\',\'err\')')+'" >✓ Hoàn thành</button>';
      }
      html += '<button class="btn btn-blue" onclick="empSaveNotes(\''+taskId+'\',\''+t.job_id+'\',this)">Lưu ghi chú</button>';
      html += '</div></div>';
      setModal(html);
    })
    .withFailureHandler(function(e){ setModal('<p class="empty">Lỗi: '+e.message+'</p>'); })
    .getTaskWithImages(taskId);
}

function openEmpJobView(jobId) {
  showModal(spinner(), true);
  google.script.run
    .withSuccessHandler(function(job) {
      if (!job) { setModal('<p class="empty">Không tìm thấy Job</p>'); return; }
      var tst  = APP.stList('task');
      var myId = APP.user ? APP.user.id : '';

      // Header với avatar
      var avtUrl = job.avatar_id ? 'https://lh3.googleusercontent.com/d/'+job.avatar_id : '';
      var html = '<div class="modal-hd">';
      html += '<div style="display:flex;align-items:center;gap:12px">';
      if (avtUrl) html += '<img src="'+avtUrl+'" style="width:52px;height:52px;object-fit:cover;border-radius:10px;border:1px solid #eee;cursor:zoom-in;flex-shrink:0" onclick="openLightbox(\''+avtUrl+'\',\''+avtUrl+'\')">';
      else html += '<div style="width:52px;height:52px;border-radius:10px;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">📦</div>';
      html += '<div><div style="font-weight:700;font-size:1rem">'+esc(job.code)+' — '+esc(job.name)+'</div>';
      html += '<div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">';
      if (job.status) html += '<span class="badge" style="background:'+job.status.color+'22;color:'+job.status.color+'">'+job.status.label+'</span>';
      if (job.category) html += '<span class="chip">'+esc(job.category)+'</span>';
      if (job.deadline) html += '<span class="chip">⏰ '+fmtDate(job.deadline)+'</span>';
      html += '</div></div></div>';
      html += '<button class="btn-x" onclick="closeModal()">✕</button></div>';

      html += '<div class="modal-bd">';

      // Hạng mục sửa
      if (job.repair_scope) {
        html += '<div class="detail-box" style="margin-bottom:16px"><h4>Hạng mục sửa</h4><p style="font-size:.88rem;white-space:pre-line">'+esc(job.repair_scope)+'</p></div>';
      }

      // Flow tasks — desktop dùng DAG, mobile dùng vertical list
      var sorted = job.tasks.slice().sort(function(a,b){ return Number(a.order)-Number(b.order); });
      if (!isMobile()) {
        html += '<div style="font-weight:600;margin-bottom:8px">Luồng công việc</div>';
        html += renderDAG(job.tasks, tst);
        html += '<div style="font-weight:600;margin:12px 0 8px">Chi tiết task</div>';
      } else {
        html += '<div style="font-weight:600;margin-bottom:10px">Luồng công việc ('+sorted.length+' bước)</div>';
      }
      sorted.forEach(function(t, i) {
        var st   = tst.filter(function(s){ return s.id===t.status_id; })[0];
        var asgn = APP.user_by_id(t.assignee_id);
        var isMe = t.assignee_id === myId;
        var norm = (st ? st.label : '').toLowerCase().replace(/\s/g,'');
        var isDone = norm==='hoànthành'||norm==='đãxong';
        var isIP   = norm==='đanglàm';
        var dotColor = isDone ? '#4CAF50' : isIP ? '#FF9800' : '#bdbdbd';
        var snapData = esc(JSON.stringify({id:t.id,name:t.name,order:t.order||i+1,assignee:asgn?asgn.name:'Chưa phân công',completed_at:t.completed_at||'',evidence_id:t.evidence_id||'',status_label:st?st.label:'',status_color:st?st.color:'#999'}));

        if (isMobile()) {
          // Vertical timeline card
          html += '<div style="display:flex;gap:10px;margin-bottom:6px;cursor:pointer" onclick="_showEmpTaskSnap(this)" data-t="'+snapData+'">';
          html += '<div style="display:flex;flex-direction:column;align-items:center;gap:0;width:20px;flex-shrink:0">';
          html += '<div style="width:18px;height:18px;border-radius:50%;background:'+dotColor+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">'+(isDone?'✓':isIP?'▶':(t.order||i+1))+'</div>';
          if (i < sorted.length-1) html += '<div style="width:2px;flex:1;background:#eee;min-height:20px;margin:2px 0"></div>';
          html += '</div>';
          html += '<div style="flex:1;min-width:0;padding-bottom:8px;border-radius:10px;'+(isMe?'background:#eef2ff;padding:8px 10px;':'padding:2px 0 8px')+(isDone?'opacity:.75':'')+'">';
          html += '<div style="font-size:.88rem;font-weight:600;color:'+(isMe?'#0d1b4b':'#222')+'">'+esc(t.name||'—')+(isMe?' <span style="font-size:.7rem;color:#0d1b4b">← bạn</span>':'')+'</div>';
          html += '<div style="font-size:.75rem;color:#999;margin-top:2px">'+esc(asgn?asgn.name:'Chưa phân công');
          if (st) html += ' · <span style="color:'+st.color+'">'+st.label+'</span>';
          html += '</div>';
          if (t.evidence_id) { var eCnt = t.evidence_id.split(',').filter(Boolean).length; html += '<div style="font-size:.72rem;color:#aaa;margin-top:2px">📷 '+eCnt+' ảnh</div>'; }
          html += '</div>';
          html += '<div style="color:#ddd;font-size:1rem;align-self:center">›</div>';
          html += '</div>';
        } else {
          html += '<div class="task-item" style="cursor:pointer;'+(isMe?'border-color:#1a3a8f;background:#eef2ff':'')+'" onclick="_showEmpTaskSnap(this)" data-t="'+snapData+'">';
          html += '<div class="task-num" style="'+(isMe?'background:#0d1b4b':'')+'">'+( t.order||i+1)+'</div>';
          html += '<div class="task-info"><div class="task-name">'+esc(t.name||'—')+(isMe?' <span style="color:#0d1b4b;font-size:.75rem">← của bạn</span>':'')+'</div>';
          html += '<div class="task-meta">'+esc(asgn?asgn.name:'Chưa phân công')+'</div></div>';
          html += (st?'<span class="badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.label+'</span>':'');
          html += '<span style="color:#ccc;margin-left:4px;font-size:.85rem">›</span>';
          html += '</div>';
        }
      });

      html += '</div>';
      html += '<div class="modal-ft"><button class="btn btn-outline" onclick="closeModal()">Đóng</button></div>';
      setModal(html);
    })
    .withFailureHandler(function(e){ setModal('<p class="empty">Lỗi: '+e.message+'</p>'); })
    .getJobWithDetails(jobId);
}

function _showEmpTaskSnap(el) {
  var t;
  try { t = JSON.parse(el.getAttribute('data-t')); } catch(e) { return; }
  var ids = (t.evidence_id || '').split(',').filter(Boolean);
  var html = '<div class="modal-hd">';
  html += '<div style="display:flex;align-items:center;gap:10px">';
  html += '<div style="width:28px;height:28px;border-radius:50%;background:#0d1b4b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0">'+t.order+'</div>';
  html += '<span style="font-weight:600;font-size:1rem">'+esc(t.name)+'</span>';
  html += '</div><button class="btn-x" onclick="closeModal()">✕</button></div>';
  html += '<div class="modal-bd">';
  // Trạng thái + người làm + thời gian
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">';
  if (t.status_label) html += '<span class="badge" style="background:'+t.status_color+'22;color:'+t.status_color+'">'+esc(t.status_label)+'</span>';
  html += '<span class="chip">👤 '+esc(t.assignee)+'</span>';
  if (t.completed_at) html += '<span class="chip">✓ '+fmtDate(t.completed_at)+'</span>';
  html += '</div>';
  // Ảnh evidence
  if (ids.length) {
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
    ids.forEach(function(id) {
      var url = 'https://lh3.googleusercontent.com/d/'+id;
      html += '<img src="'+url+'" style="width:88px;height:88px;object-fit:cover;border-radius:10px;cursor:zoom-in" onclick="openLightbox(\''+url+'\',\'https://drive.google.com/file/d/'+id+'/view\')">';
    });
    html += '</div>';
  } else {
    html += '<div style="color:#bbb;font-size:.85rem">Chưa có ảnh</div>';
  }
  html += '</div>';
  html += '<div class="modal-ft"><button class="btn btn-outline" onclick="closeModal()">Đóng</button></div>';
  setModal(html);
}

function empUpdStatusBtn(btn, taskId, statusId, jobId) {
  // Lưu cả ghi chú + status cùng lúc
  var empNotes = gv('emp-notes');
  var data = { status_id: statusId };
  if (jobId) data.job_id = jobId;
  if (empNotes !== null) data.emp_notes = empNotes;
  gsRun(btn, 'updateTask', [taskId, data],
    function(){ toast('Đã lưu','ok'); closeModal(); renderMyTasks(); });
}

function empSaveNotes(taskId, jobId, btn) {
  var empNotes = gv('emp-notes');
  gsRun(btn||null, 'updateTask', [taskId, {emp_notes:empNotes, job_id:jobId}],
    function(){ toast('Đã lưu ghi chú','ok'); });
}

// ---- SETTINGS ----
function renderSettings() {
  var el = document.getElementById('pg-settings');
  el.innerHTML = spinner();
  google.script.run
    .withSuccessHandler(function(d) {
      APP.users = d.users||[]; APP.statuses = d.statuses||[]; APP.taskTemplates = d.taskTemplates||[];
      var emps = APP.emps();
      var jst = APP.stList('job');
      var tst = APP.stList('task');
      var html = '<div class="page-header"><div><h1>Cài đặt</h1></div></div>';
      html += '<div class="set-sec"><h3>Bảo mật</h3>';
      html += '<div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-pw" type="password" placeholder="Mật khẩu quản lý mới..." style="max-width:240px"><button class="btn btn-blue" onclick="changePw(this)">Đổi mật khẩu QL</button></div>';
      html += '</div>';
      html += '<div class="set-sec"><h3>Nhân viên ('+emps.length+')</h3>';
      emps.forEach(function(u) {
        html += '<div class="set-row"><span>'+esc(u.name)+'</span><div style="display:flex;gap:8px">';
        html += '<button class="btn btn-sm btn-outline" onclick="toggleRole(\''+u.id+'\',\''+esc(u.name)+'\',\''+u.role+'\')">'+(u.role==='manager'?'Manager':'Promote')+'</button>';
        html += '<button class="btn btn-sm btn-ghost" onclick="delUser(\''+u.id+'\',this)">Xóa</button></div></div>';
      });
      html += '<div style="display:flex;gap:8px;margin-top:12px"><input id="new-uname" placeholder="Tên nhân viên mới..." style="max-width:200px"><button class="btn btn-blue" onclick="addUser(this)">+ Thêm</button></div></div>';
      html += '<div class="set-sec"><h3>Trạng thái Job</h3><div class="tag-list">';
      jst.forEach(function(s){ html += '<div class="tag-it"><span class="tdot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="rm" onclick="delStatus(\''+s.id+'\')">✕</span></div>'; });
      html += '</div><div style="display:flex;gap:8px;margin-top:10px;align-items:center"><input id="new-jst-lbl" placeholder="Tên trạng thái..." style="max-width:160px"><input type="color" id="new-jst-col" value="#607D8B" style="width:40px;padding:2px;border-radius:4px"><button class="btn btn-sm btn-outline" onclick="addStatus(\'job\')">+ Thêm</button></div></div>';
      html += '<div class="set-sec"><h3>Trạng thái Task</h3><div class="tag-list">';
      tst.forEach(function(s){ html += '<div class="tag-it"><span class="tdot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="rm" onclick="delStatus(\''+s.id+'\')">✕</span></div>'; });
      html += '</div><div style="display:flex;gap:8px;margin-top:10px;align-items:center"><input id="new-tst-lbl" placeholder="Tên trạng thái..." style="max-width:160px"><input type="color" id="new-tst-col" value="#607D8B" style="width:40px;padding:2px;border-radius:4px"><button class="btn btn-sm btn-outline" onclick="addStatus(\'task\')">+ Thêm</button></div></div>';
      html += '<div class="set-sec"><h3>Mẫu Task</h3><div class="tag-list">';
      APP.taskTemplates.forEach(function(t){ html += '<div class="tag-it">'+esc(t.name)+'<span class="rm" onclick="delTmpl(\''+t.id+'\')">✕</span></div>'; });
      html += '</div><div style="display:flex;gap:8px;margin-top:10px"><input id="new-tmpl" placeholder="Tên task mẫu..." style="max-width:200px"><button class="btn btn-sm btn-outline" onclick="addTmpl()">+ Thêm</button></div></div>';
      html += '<div class="set-sec"><h3>Khởi tạo hệ thống</h3><p class="muted" style="margin-bottom:10px">Tạo tất cả sheet, seed dữ liệu. Chạy 1 lần khi setup.</p><button class="btn btn-outline" onclick="runSetup()">Chạy Setup</button></div>';
      el.innerHTML = html;
    })
    .withFailureHandler(function(e){ el.innerHTML = '<p class="empty">Lỗi: '+e.message+'</p>'; })
    .getInitialData();
}

function changePw(btn) { var pw=gv('new-pw'); if(!pw) return; gsRun(btn,'updateSetting',['manager_password',pw],function(){ toast('Đã đổi mật khẩu QL','ok'); document.getElementById('new-pw').value=''; }); }
function addUser(btn) { var n=gv('new-uname').trim(); if(!n) return; gsRun(btn,'createUser',[{name:n,role:'employee'}],function(){ toast('Đã thêm','ok'); renderSettings(); }); }
function delUser(id,btn) { if(!confirm('Xóa nhân viên này?')) return; gsRun(btn,'deleteUser',[id],function(){ toast('Đã xóa','ok'); renderSettings(); }); }
function toggleRole(id, name, role) { google.script.run.withSuccessHandler(function(){ toast('Đã cập nhật','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).updateUser(id,{role:role==='manager'?'employee':'manager'}); }
function addStatus(type) {
  var prefix = type === 'job' ? 'new-jst' : 'new-tst';
  var l = gv(prefix+'-lbl').trim();
  if (!l) { toast('Vui lòng nhập tên trạng thái','err'); return; }
  var c = gv(prefix+'-col');
  google.script.run
    .withSuccessHandler(function(){ toast('Đã thêm','ok'); renderSettings(); })
    .withFailureHandler(function(e){ toast(e.message,'err'); })
    .createStatus({entity_type:type, label:l, color:c, order:99});
}
function delStatus(id) { if(!confirm('Xóa trạng thái?')) return; google.script.run.withSuccessHandler(function(){ toast('Đã xóa','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).deleteStatus(id); }
function addTmpl() { var n=gv('new-tmpl').trim(); if(!n) return; google.script.run.withSuccessHandler(function(){ toast('Đã thêm','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).createTaskTemplate({name:n}); }
function delTmpl(id) { google.script.run.withSuccessHandler(function(){ toast('Đã xóa','ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).deleteTaskTemplate(id); }
function runSetup() { google.script.run.withSuccessHandler(function(r){ toast(r,'ok'); renderSettings(); }).withFailureHandler(function(e){toast(e.message,'err');}).setupSheets(); }

// ---- MODAL ----
function viewImg(fileId) {
  var url = 'https://lh3.googleusercontent.com/d/' + fileId;
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="closeModal()" style="display:flex;align-items:center;justify-content:center;padding:20px"><img src="'+url+'" style="max-width:100%;max-height:90vh;border-radius:12px;display:block"></div>';
}
function showModal(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}
function showModalLg(html) {
  document.getElementById('modal-wrap').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal modal-lg">'+html+'</div></div>';
}
function setModal(html) {
  var m = document.querySelector('.modal');
  if (m) m.innerHTML = html;
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ---- TOAST ----
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

// ---- UTILS ----
function gv(id) { var e=document.getElementById(id); return e?e.value:''; }
function spinner() { return '<div class="spin-wrap"><div class="spin"></div> Đang tải...</div>'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Wrapper google.script.run với auto loading button
function gsRun(btn, fn, args, ok, fail) {
  if (typeof btn === 'string') btn = document.getElementById(btn);
  var orig = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="btn-spin"></span>'; }
  function restore(){ if(btn){ btn.disabled=false; btn.innerHTML=orig; } }
  google.script.run
    .withSuccessHandler(function(r){ restore(); ok&&ok(r); })
    .withFailureHandler(function(e){ restore(); fail?fail(e):toast(e.message,'err'); })
    [fn].apply(google.script.run, args||[]);
}

function fmtDate(d) { if(!d) return ''; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateInput(d) {
  if (!d) return '';
  var dt = new Date(d);
  if (isNaN(dt)) return '';
  var y = dt.getFullYear();
  var m = String(dt.getMonth()+1).padStart(2,'0');
  var day = String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
